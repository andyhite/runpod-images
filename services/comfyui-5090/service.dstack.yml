type: task
name: comfyui-5090

image: ${RUNPOD_REGISTRY_IMAGE}

env:
  HF_TOKEN: ${HF_TOKEN}
  CIVITAI_TOKEN: ${CIVITAI_TOKEN}
  PUBLIC_KEY: ${PUBLIC_KEY}

resources:
  gpu:
    name: [RTX5090, L40S]
  disk: 50GB

spot_policy: auto

regions: [${DSTACK_REGION}]

volumes:
  - name: comfy-ui
    path: /workspace/runpod-slim

ports:
  - 8188
  - 22
  - 8888
  - 8080
