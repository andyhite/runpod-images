type: task
name: comfyui-5090

image: ${{ env.RUNPOD_REGISTRY_IMAGE }}

env:
  HF_TOKEN: ${{ env.HF_TOKEN }}
  CIVITAI_TOKEN: ${{ env.CIVITAI_TOKEN }}
  PUBLIC_KEY: ${{ env.PUBLIC_KEY }}

resources:
  gpu:
    name: ["RTX5090", "L40S"]
  disk: 50GB

spot_policy: auto

regions: ["${{ env.DSTACK_REGION }}"]

volumes:
  - name: comfy-ui
    path: /workspace/runpod-slim

ports:
  - 8188
  - 22
  - 8888
  - 8080
